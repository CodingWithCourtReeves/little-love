<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found · LittleLove</title>
  <meta name="robots" content="noindex" />

    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: var(--pad); position: relative; }
    .nf__glow { position: absolute; inset: -20% auto auto 50%; transform: translateX(-50%); width: 80vw; max-width: 640px; height: 460px; background: radial-gradient(ellipse at center, var(--glow-1), transparent 65%); filter: blur(30px); pointer-events: none; z-index: -1; }
    .nf__card { max-width: 440px; display: grid; gap: 1.2rem; justify-items: center; }
    .nf__code { font-family: var(--font-mono); font-size: 0.82rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-user); }
    .nf h1 { font-family: var(--font-display); font-weight: 500; font-size: clamp(1.9rem, 6vw, 2.7rem); line-height: 1.05; letter-spacing: -0.02em; }
    .nf p { color: var(--text-muted); max-width: 34ch; }
  </style>
</head>
<body>
  <div class="nf__glow" aria-hidden="true"></div>
  <main class="nf">
    <div class="nf__card">
      <p class="nf__code">404</p>
      <h1>This page isn&rsquo;t here.</h1>
      <p>The link may be old or mistyped. Nothing private was lost, it just isn&rsquo;t at this address.</p>
      <a class="btn btn--primary" href="/">Back to LittleLove</a>
    </div>
  </main>
  <script src="/main.js" defer></script>
</body>
