<!doctype html>
<!--
  HISTORICAL MOCK — superseded (annotated 2026-06-16). Predates the removal of the
  AI "familiar" / bring-your-own-model feature. LittleLove is now a couples-first,
  channels-based, fully E2EE messenger with NO AI and NO familiars. Any familiar /
  bot / AI element shown here is a RETIRED design and does not reflect the current
  product. For current framing see README.md and docs/positioning.md.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LittleLove — Welcome</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-canvas:#F4EBEC;
    --bg-surface:#EBDFE2;
    --bg-surface-alt:#E2D3D8;
    --text-primary:#2A1F2A;
    --text-muted:#7C6C78;
    --accent-user:#A04A6A;
    --accent-partner:#9C7E94;
    --accent-familiar:#4F7A5E;
    --border-soft:#D9C7CD;
    --rule-strong:#4F7A5E;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px}
  .stage{width:100%;max-width:520px;position:relative}
  .mark{display:flex;align-items:baseline;gap:10px;margin-bottom:96px}
  .mark .dot{width:8px;height:8px;background:var(--accent-user);border-radius:50%;display:inline-block;transform:translateY(-1px)}
  .mark .name{font-family:'Inter Tight',serif;font-weight:500;font-size:15px;letter-spacing:.02em}
  .mark .meta{margin-left:auto;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted)}
  h1{font-family:'Inter Tight',serif;font-weight:500;font-size:44px;line-height:1.06;letter-spacing:-.025em;margin:0 0 18px;max-width:14ch}
  h1 em{font-style:italic;color:var(--accent-user);font-weight:500}
  .sub{font-size:15px;line-height:1.55;color:var(--text-muted);max-width:38ch;margin:0 0 56px}
  .actions{display:flex;flex-direction:column;gap:12px;max-width:380px}
  button{font:inherit;cursor:pointer;border:0;padding:0}
  .btn-primary{
    background:var(--text-primary);color:#F4EBEC;
    padding:16px 22px;border-radius:2px;font-size:15px;font-weight:500;
    text-align:left;display:flex;align-items:center;justify-content:space-between;
    min-height:52px;letter-spacing:-.005em;
    transition:background 180ms ease;
  }
  .btn-primary:hover{background:#3A2D3A}
  .btn-primary .arrow{font-family:'Inter Tight',serif;font-size:18px;opacity:.8}
  .btn-secondary{
    background:transparent;color:var(--text-primary);
    padding:16px 22px;border:1px solid var(--border-soft);border-radius:2px;
    font-size:15px;font-weight:500;text-align:left;
    display:flex;align-items:center;justify-content:space-between;
    min-height:52px;letter-spacing:-.005em;
    transition:border-color 180ms ease, background 180ms ease;
  }
  .btn-secondary:hover{border-color:var(--accent-familiar);background:rgba(79,122,94,.04)}
  .btn-secondary .arrow{color:var(--text-muted);font-family:'Inter Tight',serif;font-size:18px}
  .footnote{
    position:absolute;bottom:-64px;left:0;right:0;
    font-size:11px;color:var(--text-muted);letter-spacing:.04em;
    display:flex;align-items:center;gap:8px;line-height:1.5;max-width:42ch;
  }
  .footnote .rule{width:18px;height:1px;background:var(--rule-strong);display:inline-block;flex-shrink:0}
  .corner{
    position:fixed;top:24px;right:32px;font-size:10px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);
  }
  .vrule{
    position:absolute;left:-32px;top:160px;bottom:-32px;width:1px;
    background:linear-gradient(to bottom, transparent, var(--rule-strong) 30%, var(--rule-strong) 70%, transparent);
    opacity:.5;
  }
</style>
</head>
<body>
  <div class="corner">Twilight · light</div>
  <div class="stage">
    <div class="vrule" aria-hidden="true"></div>
    <header class="mark">
      <span class="dot" aria-hidden="true"></span>
      <span class="name">LittleLove</span>
      <span class="meta">v0.2</span>
    </header>
    <h1>A messenger for <em>two</em>.</h1>
    <p class="sub">Conversations live only on devices you own. The server holds ciphertext it cannot read.</p>
    <div class="actions">
      <button class="btn-primary">Create an account <span class="arrow">→</span></button>
      <button class="btn-secondary">Sign in with a recovery phrase <span class="arrow">→</span></button>
    </div>
    <div class="footnote">
      <span class="rule" aria-hidden="true"></span>
      <span>Hosted by a small couple. No cloud AI providers — ever.</span>
    </div>
  </div>
</body>
</html>
