<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LittleLove — Confirm</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-canvas:#F4EBEC;--bg-surface:#EBDFE2;
    --text-primary:#2A1F2A;--text-muted:#7C6C78;
    --accent-user:#A04A6A;--accent-familiar:#4F7A5E;
    --border-soft:#D9C7CD;--rule-strong:#4F7A5E;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-canvas);color:var(--text-primary);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px}
  .topnav{position:fixed;top:24px;left:32px;right:32px;display:flex;align-items:center}
  .back{font-size:13px;color:var(--text-muted);text-decoration:none}
  .crumb{margin-left:auto;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted)}
  .crumb b{color:var(--accent-user);font-weight:500}
  .stage{width:100%;max-width:560px;position:relative}
  .stepmark{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent-familiar);margin-bottom:24px;display:flex;align-items:center;gap:10px}
  .stepmark .bar{width:24px;height:1px;background:var(--rule-strong)}
  h1{font-family:'Inter Tight',serif;font-weight:500;font-size:34px;line-height:1.12;letter-spacing:-.025em;margin:0 0 14px;max-width:22ch}
  h1 em{font-style:italic;color:var(--accent-user)}
  .sub{font-size:14px;line-height:1.65;color:var(--text-muted);max-width:46ch;margin:0 0 48px}
  .slots{display:flex;flex-direction:column;gap:24px;margin-bottom:8px}
  .slot{display:grid;grid-template-columns:64px 1fr;align-items:end;gap:20px}
  .slot .label{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);
    letter-spacing:.06em;padding-bottom:18px;text-align:right;
  }
  .slot .label b{display:block;font-family:'Inter Tight';font-weight:500;font-size:28px;color:var(--text-primary);letter-spacing:-.02em;margin-bottom:2px;line-height:1}
  .slot input{
    font:inherit;font-family:'Inter Tight';font-size:24px;font-weight:500;color:var(--text-primary);
    letter-spacing:-.015em;background:transparent;border:0;outline:0;
    padding:12px 0;border-bottom:1px solid var(--border-soft);
    transition:border-color 200ms ease;
  }
  .slot input:focus{border-bottom-color:var(--accent-familiar)}
  .slot.filled input{color:var(--text-primary)}
  .slot.active input{border-bottom-color:var(--accent-familiar)}
  .slot.error input{border-bottom-color:var(--accent-user)}
  .actions{margin-top:48px;display:flex;align-items:center;gap:20px}
  .btn-primary{
    background:var(--text-primary);color:#F4EBEC;font:inherit;
    padding:15px 22px;border:0;border-radius:2px;font-size:14px;font-weight:500;
    cursor:pointer;min-height:52px;letter-spacing:-.005em;display:inline-flex;align-items:center;gap:12px;
  }
  .btn-primary[disabled]{opacity:.35;cursor:not-allowed}
  .btn-primary:not([disabled]):hover{background:#3A2D3A}
  .help{font-size:12px;color:var(--text-muted);max-width:32ch;line-height:1.55}
  .help a{color:var(--accent-familiar);text-decoration:none;border-bottom:1px solid var(--accent-familiar)}
</style>
</head>
<body>
  <nav class="topnav">
    <a href="signup-phrase.html" class="back">← Back</a>
    <span class="crumb">Step 01 · 02 · <b>03</b></span>
  </nav>
  <div class="stage">
    <div class="stepmark"><span class="bar"></span>One last check before we set this in stone</div>
    <h1>Type three of those words back to <em>prove you wrote them down</em>.</h1>
    <p class="sub">We pick words at random. If you can answer these, you've made a real copy.</p>
    <div class="slots">
      <div class="slot filled">
        <div class="label"><b>03</b>word</div>
        <input type="text" value="river" autocomplete="off" spellcheck="false" />
      </div>
      <div class="slot active">
        <div class="label"><b>07</b>word</div>
        <input type="text" placeholder="…" autocomplete="off" spellcheck="false" autofocus />
      </div>
      <div class="slot">
        <div class="label"><b>11</b>word</div>
        <input type="text" placeholder="…" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" disabled>Confirm and create account <span style="font-family:'Inter Tight';font-size:18px">→</span></button>
      <span class="help">Lost them already? <a href="signup-phrase.html">Show me the words again.</a></span>
    </div>
  </div>
</body>
</html>
