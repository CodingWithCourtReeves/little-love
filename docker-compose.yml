services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${API_PORT:-7707}:7707"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      PORT: 7707
      # The api container talks to postgres over the compose network, not via
      # the host port mapping. Host tools (cargo tests) keep using
      # ${DATABASE_URL} from .dev.env, which still points at localhost:${POSTGRES_PORT}.
      DATABASE_URL: postgres://littlelove:dev@postgres:5432/littlelove
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: littlelove
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: littlelove
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U littlelove"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
