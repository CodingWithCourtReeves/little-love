name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/littlelove-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/littlelove-api:latest

  app-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.22.x'
      - name: Build macOS
        working-directory: app
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release
      - name: Package as .dmg
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          brew install create-dmg
          cd app/build/macos/Build/Products/Release
          create-dmg \
            --volname "LittleLove" \
            --window-size 540 360 \
            --icon-size 96 \
            --app-drop-link 410 180 \
            "$GITHUB_WORKSPACE/LittleLove-${REF_NAME}.dmg" \
            "littlelove.app"
      - uses: softprops/action-gh-release@v2
        with:
          files: LittleLove-${{ github.ref_name }}.dmg

  app-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.22.x'
      - name: Build Windows
        working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
      - name: Package as zip
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $src = "app/build/windows/x64/runner/Release"
          $dest = "LittleLove-$env:REF_NAME-win64.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dest
      - uses: softprops/action-gh-release@v2
        with:
          files: LittleLove-${{ github.ref_name }}-win64.zip
