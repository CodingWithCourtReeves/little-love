name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.1 — v prefix is added automatically)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: create
        name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "✗ tag $TAG already exists; pick a different version"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  container:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/littlelove-api:${{ needs.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/littlelove-api:latest

  app-macos:
    needs: tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.x'
      - name: Build macOS
        working-directory: app
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release
      - name: Package as .dmg
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          brew install create-dmg
          cd app/build/macos/Build/Products/Release
          create-dmg \
            --volname "LittleLove" \
            --window-size 540 360 \
            --icon-size 96 \
            --app-drop-link 410 180 \
            "$GITHUB_WORKSPACE/LittleLove-${TAG}.dmg" \
            "littlelove.app"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: LittleLove-${{ needs.tag.outputs.tag }}.dmg

  app-windows:
    needs: tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.x'
      - name: Build Windows
        working-directory: app
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
      - name: Package as zip
        shell: pwsh
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          $src = "app/build/windows/x64/runner/Release"
          $dest = "LittleLove-$env:TAG-win64.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dest
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: LittleLove-${{ needs.tag.outputs.tag }}-win64.zip
