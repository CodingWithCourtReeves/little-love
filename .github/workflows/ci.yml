name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    # Public-repo safety: never run untrusted fork-PR code on the self-hosted
    # runner. Runs on our own pushes to main and same-repo branch PRs only; PRs
    # opened from forks are skipped (they'd otherwise execute on Court's Mac).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Self-hosted macOS runner (Court's Mac). GitHub `services:` containers only
    # work on Linux runners, so we start Postgres ourselves via the Mac's Docker.
    runs-on: [self-hosted, macOS]
    env:
      DATABASE_URL: postgres://littlelove:dev@localhost:5432/littlelove
    steps:
      - uses: actions/checkout@v4
      - name: Start Postgres
        run: |
          docker rm -f ci-postgres 2>/dev/null || true
          docker run -d --name ci-postgres \
            -e POSTGRES_USER=littlelove -e POSTGRES_PASSWORD=dev -e POSTGRES_DB=littlelove \
            -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do
            if docker exec ci-postgres pg_isready -U littlelove >/dev/null 2>&1; then
              echo "postgres ready"; break
            fi
            sleep 1
          done
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace
      - name: Stop Postgres
        if: always()
        run: docker rm -f ci-postgres || true

  flutter:
    # Public-repo safety: skip fork PRs (see note on the `rust` job).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.x'
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  ios-build:
    # Public-repo safety: skip fork PRs (see note on the `rust` job).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Runs on a self-hosted macOS runner (Court's Mac) instead of GitHub-hosted
    # macOS to avoid the 10x Actions-minute multiplier. rust + flutter stay on
    # GitHub-hosted Linux (cheap, and service containers only work on Linux).
    runs-on: [self-hosted, macOS]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.x'
      - run: flutter pub get
      - name: pod install
        working-directory: app/ios
        run: pod install
      - name: build ios (simulator, no codesign)
        run: flutter build ios --simulator --no-codesign
